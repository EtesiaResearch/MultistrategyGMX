packages:
  - 'apps/*'
  - 'packages/*'

# pnpm 10 settings. minimumReleaseAge: supply-chain guard — refuse npm versions
# newer than N minutes (1440 = 24h), forcing a slightly older, vetted release.
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@gmx-io/sdk'
onlyBuiltDependencies:
  - esbuild
